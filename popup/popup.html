<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSV Notes</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="header-icon">⊞</span>
        <span class="header-title">CSV Notes</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" id="btn-import" title="Import CSV">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="btn-icon" id="btn-export" title="Export CSV">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </button>
        <input type="file" id="import-input" accept=".csv" hidden />
      </div>
    </header>

    <div class="layout">

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-label">Files</span>
          <button class="btn-add-file" id="btn-new-file" title="New CSV file">+</button>
        </div>
        <ul class="file-list" id="file-list"></ul>
      </aside>

      <!-- Main spreadsheet area -->
      <main class="main">
        <div class="empty-state" id="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          <p>No file selected</p>
          <span>Create a new CSV or select one from the sidebar</span>
          <button class="btn-primary" id="btn-empty-new">+ New CSV</button>
        </div>

        <div class="spreadsheet" id="spreadsheet" style="display:none;">
          <div class="spreadsheet-toolbar">
            <span class="active-filename" id="active-filename"></span>
            <div class="toolbar-actions">
              <button class="btn-toolbar" id="btn-add-col">+ Column</button>
              <button class="btn-toolbar" id="btn-add-row">+ Row</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="csv-table" id="csv-table">
              <thead id="table-head"></thead>
              <tbody id="table-body"></tbody>
            </table>
          </div>
        </div>
      </main>

    </div>
  </div>

  <script src="../libs/papaparse.min.js"></script>
  <script src="../storage/storage.js"></script>
  <script src="popup.js"></script>
</body>
</html>
